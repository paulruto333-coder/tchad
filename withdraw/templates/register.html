{% extends "base.html" %}
{% load static %}

{% block title %}Inscription - Starlink Tchad{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900">Inscription</h2>
                <p class="text-gray-500 mt-2">Créez votre compte Starlink Tchad</p>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Prénom</label>
                    <input type="text" name="first_name" required 
                           class="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                           placeholder="Votre prénom">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Numéro de téléphone</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">+235</span>
                        <input type="tel" name="phone_number" required 
                               class="w-full pl-16 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                               placeholder="66000000">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
                    <input type="password" name="password1" required 
                           class="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                           placeholder="••••••••">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Confirmer le mot de passe</label>
                    <input type="password" name="password2" required 
                           class="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                           placeholder="••••••••">
                </div>

                <div class="flex items-start">
                    <input type="checkbox" name="terms" required class="mt-1 h-4 w-4 text-blue-600 rounded border-gray-300">
                    <label class="ml-2 text-sm text-gray-500">J'accepte les <a href="#" class="text-blue-600 font-bold hover:underline">conditions d'utilisation</a></label>
                </div>

                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all">
                    S'inscrire
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-gray-500">Vous avez déjà un compte ? 
                    <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">Se connecter</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
